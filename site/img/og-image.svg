<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="150" r="300" fill="#6c63ff" opacity="0.08"/>
  <circle cx="200" cy="500" r="200" fill="#a78bfa" opacity="0.06"/>
  <!-- Logo text -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">Neo<tspan fill="url(#accent)">TUN</tspan></text>
  <!-- Tagline -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">Быстрый и безопасный VPN</text>
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">с современным шифрованием</text>
  <!-- Features -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="30" fill="#a0a0c0"> Без ограничений скорости   Обход блокировок   Все устройства</text>
  <!-- CTA -->
  <rect x="80" y="450" width="320" height="70" rx="12" fill="url(#accent)"/>
  <text x="240" y="494" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Начать бесплатно </text>
  <!-- Domain -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="24" fill="#6060a0" text-anchor="end">neotun.com</text>
</svg>
