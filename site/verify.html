<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтверждение — NeoTUN</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">Neo<span>TUN</span></a>
</nav>
<main>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Neo<span>TUN</span></div>
      <h2>Подтверждение</h2>
      <p class="auth-sub" id="verify-hint">Загрузка...</p>
      <div id="verify-error" class="code-error hidden"></div>
      <div class="code-input-wrap">
        <input type="text" id="otp-input" class="code-input"
               placeholder="——————" maxlength="6" pattern="\d{6}"
               autocomplete="one-time-code" inputmode="numeric" autofocus/>
        <div class="code-hint">6 цифр · Действует 10 минут</div>
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="btn-verify">Войти →</button>
      <button class="btn btn-ghost btn-full" id="btn-resend" style="margin-top:8px" disabled>
        Отправить повторно (<span id="resend-timer">60</span>с)
      </button>
    </div>
  </div>
</main>
<div id="toast" class="toast"></div>
<script src="js/main.js"></script>
<script>
  // Standalone verify page — reads email from sessionStorage
  const email = sessionStorage.getItem('otp_email');
  if (!email) { window.location.href = 'login.html'; }
  document.getElementById('verify-hint').innerHTML =
    'Код отправлен на <strong>' + email + '</strong>';

  // Reuse auth.js verify logic
  document.getElementById('btn-verify').addEventListener('click', async () => {
    const code = document.getElementById('otp-input').value.trim();
    const errEl = document.getElementById('verify-error');
    errEl.classList.add('hidden');
    if (code.length !== 6) { errEl.textContent = 'Введите 6-значный код'; errEl.classList.remove('hidden'); return; }
    const btn = document.getElementById('btn-verify');
    btn.classList.add('btn-loading'); btn.disabled = true;
    try {
      const r = await fetch('https://app.neotun.ru/auth/email/verify', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, code })
      });
      const d = await r.json();
      if (d.ok) {
        localStorage.setItem('jwt_token', d.token);
        sessionStorage.removeItem('otp_email');
        window.location.href = 'https://app.neotun.ru/';
      } else {
        const msgs = { invalid:'Неверный код', expired:'Код истёк', max_attempts:'Слишком много попыток', blocked:'Временная блокировка' };
        errEl.textContent = msgs[d.error] || 'Ошибка: ' + d.error;
        errEl.classList.remove('hidden');
      }
    } catch { errEl.textContent = 'Ошибка сети'; errEl.classList.remove('hidden'); }
    finally { btn.classList.remove('btn-loading'); btn.disabled = false; }
  });
</script>
</body>
</html>
